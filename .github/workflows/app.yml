name: app

# Gates the APP (build + e2e) — the knowledge workflow gates only the data.
# Before this, a broken dist-server shipped silently until the manual smoke
# test at deploy time. The e2e suite boots the BUILT server against a
# throwaway data dir (playwright.config.ts webServer) — exactly the artifact
# the Docker image ships.

on:
  push:
    branches: [main, dev]
    paths-ignore: ['knowledge/**', '**.md']
  pull_request:
    paths-ignore: ['knowledge/**', '**.md']
  workflow_dispatch:

jobs:
  build-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      # Lint is NOT a gate yet — the repo carries standing debt (121 errors,
      # mostly explicit-any); gate it once the debt is paid down.
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: |
            test-results/
            e2e/screenshots/
          retention-days: 7
