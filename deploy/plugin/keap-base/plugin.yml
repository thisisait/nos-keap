---
# ==============================================================================
# keap-base — nOS Tier-1 plugin autowiring manifest.
#
# Pairs with `roles/pazny.keap/`, which git-clones https://github.com/thisisait/nos-keap
# at a pinned ref and builds the image from source (nos/keap:<version>; the
# `pazny.hermes` role is the git-clone precedent), plus a `state/manifest.yml`
# row with domain_var + port_var for Traefik file-provider auto-routing and a
# `traefik_container_upstreams` entry so Traefik reaches the container directly
# over gated_net (calibre_web precedent).
#
# A Tier-2 `apps/keap.yml` with a `build:` context remains a legal fast-path
# fallback (nos_app_parser tolerates operator-built images), but Tier-1 is the
# destination. Shape model: files/anatomy/plugins/firefly-base/plugin.yml
# (header_oidc web app). Copy this tree into nOS at
#   files/anatomy/plugins/keap-base/plugin.yml
# ==============================================================================

_NOS_PLUGIN: "keap-base"

name: keap-base
version: "1.0.0"
type: [service, ui-extension]
description: "KEAP — Knowledge Explorer and Preserver: curated knowledge taxonomy, content links into nOS services, and an agent-facing knowledge API."
upstream: "https://github.com/thisisait/nos-keap"
license: "MIT"

requires:
  role: pazny.keap
  feature_flag: install_keap
  variables:
    - keap_domain
    - keap_port
    - tenant_domain
    - global_password_prefix

# ── SSO ───────────────────────────────────────────────────────────────────────
# header_oidc: the Authentik proxy outpost injects X-Authentik-* headers; the
# Node backend (server/identity.ts) derives per-user identity from them and
# rejects header-less /api requests (KEAP_TRUSTED_PROXY=1). The container joins
# the Traefik-only gated_net so peers cannot forge the headers (SEC-02).
# To go native_oidc later: flip mode/provider_type, add redirect_uris/scopes
# (see miniflux-base for the shape).
authentik:
  mode: header_oidc
  provider_type: header_oidc
  client_id: nos-keap
  client_secret: "{{ global_password_prefix }}_pw_oidc_keap"
  slug: keap
  name: 'KEAP — Knowledge Explorer'
  enabled: "{{ install_keap | default(false) }}"
  launch_url: "https://{{ keap_domain }}"
  tier: 3

# ── Compose extension (identity env + mkcert CA gate live here, not the role) ─
compose_extension:
  template: templates/keap-base.compose.yml.j2
  target_stack: iiab
  target_service: keap

# ── Lifecycle tendons ─────────────────────────────────────────────────────────
lifecycle:
  pre_compose:
    - render_compose_extension: {}
  post_compose:
    - wait_health:
        url: "http://127.0.0.1:{{ keap_port }}/api/health"
        timeout: 120

# ── GDPR Article 30 ───────────────────────────────────────────────────────────
gdpr:
  purpose: >-
    Per-user knowledge-exploration state (learning progress, todos, saved
    bookmarks), operator-curated taxonomy content links, and page metadata
    captured by the companion userscript or submitted by nOS agents for
    human review.
  legal_basis: legitimate_interests
  data_categories:
    - username          # X-Authentik-Uid/-Username/-Groups (identity + RBAC)
    - email
    - behavioural_data  # learning progress, completion state
    - user_generated_content  # captured page metadata, todos, bookmarks
  data_subjects: [end_users]
  retention_days: 365
  processors: []
  transfers_outside_eu: false

# ── Wing /hub tile ────────────────────────────────────────────────────────────
ui-extension:
  hub_card:
    title: "Knowledge Explorer"
    icon: "compass"
    url: "https://{{ keap_domain }}"
    tier: 3
    health_check: "https://{{ keap_domain }}/api/health"

# ── A9 notification routing (required across service plugins) ─────────────────
notification:
  on_critical: [wing-inbox, ntfy]
  on_high: [wing-inbox]
  on_medium: [wing-inbox]
  on_low: [wing-inbox]
  on_info: [wing-inbox]
